<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>產業熱力圖</title>
<link rel="stylesheet" href="pp-ui.css">
<script src="pp-theme.js"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>window.Vue || document.write('<script src="vue.global.prod.js"><\/script>')</script>
<style>
  .container { max-width: 1500px; margin: 0 auto; padding: 20px 20px 40px; height: 100vh; display: flex; flex-direction: column; }

  .page-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; flex-shrink: 0; }
  .page-header h1 { font-size: 21px; font-weight: 800; letter-spacing: .2px; }
  .page-header .sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .update-time { font-size: 12px; color: var(--text-muted); }

  /* ── 圖例 ── */
  .legend-bar {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    padding: 10px 16px; border-radius: var(--radius-sm); margin-bottom: 12px; flex-shrink: 0;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); font-weight: 600; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(0,0,0,.12); }
  .legend-note { margin-left: auto; font-size: 11px; color: var(--text-muted); opacity: .8; }

  /* ── 熱力圖畫布 ── */
  .heatmap-wrap {
    position: relative; flex: 1; min-height: 420px;
    border-radius: var(--radius-lg); overflow: hidden;
  }
  .heatmap-canvas { position: absolute; inset: 10px; }

  .sector-group {
    position: absolute;
    background: var(--surface-alt);
    border: 1px solid var(--stroke);
    border-radius: var(--radius-sm);
    overflow: hidden;
    box-sizing: border-box;
  }
  .sector-group-header {
    display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
    padding: 3px 10px; box-sizing: border-box;
    background: color-mix(in srgb, var(--text) 6%, transparent);
    border-bottom: 1px solid var(--stroke);
    overflow: hidden; white-space: nowrap;
  }
  .sg-name { flex: 1 1 auto; min-width: 0; font-size: 12.5px; font-weight: 750; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sg-meta { font-size: 10.5px; color: var(--text-muted); font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .sg-meta.up { color: var(--red); }
  .sg-meta.down { color: var(--green); }

  .heat-block {
    position: absolute; box-sizing: border-box;
    border-radius: 5px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.14);
    display: flex; flex-direction: column; justify-content: center;
    padding: 3px 6px; overflow: hidden; cursor: default;
    transition: filter .12s, transform .12s;
    z-index: 1;
  }
  .heat-block:hover { filter: brightness(1.08); transform: scale(1.015); z-index: 5; box-shadow: inset 0 0 0 1px rgba(255,255,255,.3), 0 4px 14px rgba(0,0,0,.28); }
  .hb-ticker { font-size: 13.5px; font-weight: 800; line-height: 1.15; letter-spacing: -.2px; }
  .hb-name { font-size: 10px; font-weight: 600; opacity: .85; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 1px; }
  .hb-price { font-size: 11px; font-weight: 650; margin-top: 2px; font-variant-numeric: tabular-nums; opacity: .92; }
  .hb-pct { font-size: 11.5px; font-weight: 800; margin-top: 1px; font-variant-numeric: tabular-nums; }

  .heat-block.small .hb-ticker { font-size: 11.5px; }
  .heat-block.small .hb-pct { font-size: 10px; }
  .heat-block.tiny { padding: 2px 4px; align-items: center; }
  .heat-block.tiny .hb-ticker { font-size: 9.5px; text-align: center; }

  /* ── 提示框 ── */
  .hm-tooltip {
    position: absolute; z-index: 50; pointer-events: none;
    width: 220px; padding: 12px 14px; border-radius: var(--radius-sm);
    background: var(--glass-strong);
    -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    box-shadow: var(--shadow);
    font-size: 12px;
  }
  .hmt-head { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
  .hmt-ticker { font-size: 14px; font-weight: 800; }
  .hmt-name { font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hmt-sector { font-size: 10.5px; color: var(--text-muted); margin-bottom: 6px; }
  .hmt-price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
  .hmt-price { font-size: 17px; font-weight: 750; font-variant-numeric: tabular-nums; }
  .hmt-pct { font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .hmt-ohlcv { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 10px; font-size: 10.5px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .hmt-ohlcv b { color: var(--text); font-weight: 650; }

  .up { color: var(--red); }
  .down { color: var(--green); }

  /* ── 空狀態 ── */
  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 40px; border-radius: var(--radius-lg);
  }
  .empty-icon { font-size: 40px; margin-bottom: 14px; opacity: .55; }
  .empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 13px; color: var(--text-muted); max-width: 360px; line-height: 1.7; margin-bottom: 18px; }

  @media (max-width: 768px) {
    .container { padding: 14px 10px 32px; }
    .legend-bar { gap: 10px; padding: 8px 12px; }
    .legend-item { font-size: 10.5px; }
    .legend-note { width: 100%; margin-left: 0; }
    .hm-tooltip { width: 190px; padding: 10px 12px; }
  }
</style>
</head>
<body>
<div id="app" class="container">

  <div class="page-header">
    <div>
      <h1>產業熱力圖</h1>
      <div class="sub" v-if="hasData">{{ totalSectorCount }} 族群 · {{ totalStockCount }} 檔標的</div>
    </div>
    <div class="header-actions">
      <span class="update-time" v-if="lastUpdated">{{ statusText || ('更新於 ' + fmtTime(lastUpdated)) }}</span>
      <button class="btn btn-sm" @click="refresh" :disabled="loading">{{ loading ? '更新中…' : '⟳ 重新整理' }}</button>
    </div>
  </div>

  <template v-if="hasData">
    <div class="legend-bar glass">
      <div class="legend-item" v-for="b in legendBuckets" :key="b.label">
        <span class="legend-swatch" :style="{ background: b.color }"></span>
        <span>{{ b.label }}</span>
      </div>
      <div class="legend-note">色塊大小 ∝ 成交量（無資料則以平均量計）· 顏色 = 漲跌幅 · 依產業族群分組</div>
    </div>

    <div class="heatmap-wrap glass" ref="wrapEl">
      <div class="heatmap-canvas" ref="canvasEl">
        <div
          v-for="sg in sectorRects" :key="sg.id"
          class="sector-group"
          :style="{ left: sg.x + 'px', top: sg.y + 'px', width: sg.w + 'px', height: sg.h + 'px' }"
        >
          <div class="sector-group-header" v-if="sg.showHeader" :style="{ height: sg.headerH + 'px' }">
            <span class="sg-name">{{ sg.name }}</span>
            <span class="sg-meta" v-if="sg.showMeta" :class="sg.avgPct == null ? '' : (sg.avgPct >= 0 ? 'up' : 'down')">
              {{ sg.count }} 檔<template v-if="sg.avgPct != null"> · {{ sg.avgPct >= 0 ? '+' : '' }}{{ sg.avgPct.toFixed(2) }}%</template>
            </span>
          </div>
        </div>

        <div
          v-for="st in stockRects" :key="st.id"
          class="heat-block"
          :class="st.cls"
          :style="{ left: st.x + 'px', top: st.y + 'px', width: st.w + 'px', height: st.h + 'px', background: st.color, color: st.textColor }"
          :title="st.ticker + ' ' + (st.name || '') + ' · ' + fmtPrice(st.price, st.market) + ' · ' + fmtPct(st.changePct)"
          @mouseenter="showTooltip(st, $event)"
          @mousemove="moveTooltip($event)"
          @mouseleave="hideTooltip"
        >
          <template v-if="st.showTicker">
            <div class="hb-ticker">{{ st.ticker }}</div>
            <div class="hb-name" v-if="st.showName">{{ st.name }}</div>
            <div class="hb-price" v-if="st.showPrice">{{ fmtPrice(st.price, st.market) }}</div>
            <div class="hb-pct">{{ fmtPct(st.changePct) }}</div>
          </template>
        </div>

        <div class="hm-tooltip" v-if="tooltip.show && tooltip.stock" :style="{ left: tooltip.x + 'px', top: tooltip.y + 'px' }">
          <div class="hmt-head">
            <span class="hmt-ticker">{{ tooltip.stock.ticker }}</span>
            <span class="hmt-name">{{ tooltip.stock.name }}</span>
          </div>
          <div class="hmt-sector">{{ marketFullLabel(tooltip.stock.market) }} · {{ tooltip.stock.sectorName }}</div>
          <div class="hmt-price-row">
            <span class="hmt-price">{{ fmtPrice(tooltip.stock.price, tooltip.stock.market) }}</span>
            <span class="hmt-pct" :class="tooltip.stock.changePct >= 0 ? 'up' : 'down'">{{ fmtPct(tooltip.stock.changePct) }}</span>
          </div>
          <div class="hmt-ohlcv" v-if="tooltip.stock.volume">
            <span>開 <b>{{ fmtNum(tooltip.stock.open) }}</b></span>
            <span>高 <b>{{ fmtNum(tooltip.stock.high) }}</b></span>
            <span>低 <b>{{ fmtNum(tooltip.stock.low) }}</b></span>
            <span>量 <b>{{ fmtVol(tooltip.stock.volume) }}</b></span>
          </div>
        </div>
      </div>
    </div>
  </template>

  <div v-else class="empty-state glass">
    <div class="empty-icon">🗺️</div>
    <h3>尚無可視覺化的股票資料</h3>
    <p>熱力圖會讀取「產業族群筆記」中的族群與成分股。請先前往該模組建立族群並加入標的，回到此頁即可看到熱力圖。</p>
    <button class="btn btn-primary btn-sm" @click="goToSectorNotes">前往產業族群筆記</button>
  </div>
</div>

<script>
const { createApp, ref, reactive, computed, onMounted, nextTick } = Vue;

const STORAGE_KEY = 'pptools-sector-notes';

/* ════════════════════════════════════════════════════════════
   Squarified Treemap — 純 JS 實作（Bruls, Huizing, van Wijk 1999）
   items: [{ weight, ... }]，就地寫入 .x / .y / .w / .h（畫布座標，px）
   ════════════════════════════════════════════════════════════ */
function squarify(items, rect) {
  if (!items.length) return;
  const totalWeight = items.reduce((s, i) => s + i.weight, 0);
  if (totalWeight <= 0 || rect.w <= 0 || rect.h <= 0) {
    items.forEach(i => { i.x = rect.x; i.y = rect.y; i.w = 0; i.h = 0; });
    return;
  }
  const totalArea = rect.w * rect.h;
  const sorted = items.slice().sort((a, b) => b.weight - a.weight);
  sorted.forEach(i => { i._area = totalArea * i.weight / totalWeight; });
  layoutRow(sorted, rect.x, rect.y, rect.w, rect.h);
}

function worstRatio(row, side) {
  const areas = row.map(c => c._area);
  const sum = areas.reduce((a, b) => a + b, 0);
  if (sum <= 0 || side <= 0) return Infinity;
  const max = Math.max(...areas), min = Math.min(...areas);
  return Math.max((side * side * max) / (sum * sum), (sum * sum) / (side * side * min));
}

function layoutRow(items, x, y, w, h) {
  if (!items.length) return;
  if (items.length === 1 || w <= 0 || h <= 0) {
    items.forEach(i => { i.x = x; i.y = y; i.w = w; i.h = h; });
    return;
  }
  const side = Math.min(w, h);
  let i = 1;
  let row = [items[0]];
  let best = worstRatio(row, side);
  while (i < items.length) {
    const trial = row.concat(items[i]);
    const ratio = worstRatio(trial, side);
    if (ratio <= best) { row = trial; best = ratio; i++; }
    else break;
  }
  const rowArea = row.reduce((s, c) => s + c._area, 0);
  const thickness = side > 0 ? rowArea / side : 0;

  if (w >= h) {
    let cy = y;
    row.forEach(c => {
      const ch = thickness > 0 ? c._area / thickness : 0;
      c.x = x; c.y = cy; c.w = thickness; c.h = ch;
      cy += ch;
    });
    layoutRow(items.slice(row.length), x + thickness, y, w - thickness, h);
  } else {
    let cx = x;
    row.forEach(c => {
      const cw = thickness > 0 ? c._area / thickness : 0;
      c.x = cx; c.y = y; c.w = cw; c.h = thickness;
      cx += cw;
    });
    layoutRow(items.slice(row.length), x, y + thickness, w, h - thickness);
  }
}

/* ── 漲跌幅 → 顏色（固定五級） ── */
function colorForChange(pct) {
  if (pct == null || isNaN(pct)) return '#9e9e9e';
  if (pct >= 3) return '#e74c3c';
  if (pct >= 1) return '#ff8a80';
  if (pct > -1) return '#9e9e9e';
  if (pct > -3) return '#69f0ae';
  return '#1fa15c';
}

/* ── WCAG 對比：依背景色自動選白字或深字 ── */
function hexToRgb(hex) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
  const num = parseInt(hex, 16);
  return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
}
function relLuminance(hex) {
  const { r, g, b } = hexToRgb(hex);
  const [R, G, B] = [r, g, b].map(v => {
    v /= 255;
    return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  });
  return 0.2126 * R + 0.7152 * G + 0.0722 * B;
}
function contrastRatio(hex1, hex2) {
  const L1 = relLuminance(hex1) + 0.05, L2 = relLuminance(hex2) + 0.05;
  return L1 > L2 ? L1 / L2 : L2 / L1;
}
function textColorFor(bgHex) {
  return contrastRatio(bgHex, '#ffffff') >= contrastRatio(bgHex, '#12151c') ? '#ffffff' : '#12151c';
}

function debounce(fn, wait) {
  let t;
  return function (...args) { clearTimeout(t); t = setTimeout(() => fn.apply(this, args), wait); };
}

createApp({
  setup() {
    const sectors = ref([]);
    const sectorRects = ref([]);
    const stockRects = ref([]);
    const loading = ref(false);
    const statusText = ref('');
    const lastUpdated = ref(null);
    const wrapEl = ref(null);
    const canvasEl = ref(null);
    const tooltip = reactive({ show: false, x: 0, y: 0, stock: null });

    const legendBuckets = [
      { label: '≥ +3%', color: '#e74c3c' },
      { label: '+1% ~ +3%', color: '#ff8a80' },
      { label: '-1% ~ +1%', color: '#9e9e9e' },
      { label: '-3% ~ -1%', color: '#69f0ae' },
      { label: '≤ -3%', color: '#1fa15c' }
    ];

    const hasData = computed(() => sectors.value.some(s => s.stocks && s.stocks.length));
    const totalSectorCount = computed(() => sectors.value.filter(s => s.stocks && s.stocks.length).length);
    const totalStockCount = computed(() => sectors.value.reduce((a, s) => a + (s.stocks ? s.stocks.length : 0), 0));

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : { sectors: [] };
        sectors.value = (parsed.sectors || []).map(s => ({
          id: s.id,
          name: s.name || '未命名族群',
          stocks: (s.stocks || []).filter(Boolean)
        }));
      } catch (e) {
        console.warn('heatmap load error', e);
        sectors.value = [];
      }
      lastUpdated.value = new Date().toISOString();
    }

    function refresh() {
      loading.value = true;
      load();
      nextTick(() => {
        relayout();
        loading.value = false;
        statusText.value = '已更新';
        setTimeout(() => { statusText.value = ''; }, 2500);
      });
    }

    /* ── 版面計算：族群層 squarify → 各族群內部再 squarify 成分股 ── */
    function relayout() {
      if (!canvasEl.value) return;
      const w = canvasEl.value.clientWidth;
      const h = canvasEl.value.clientHeight;
      if (w < 10 || h < 10) { return; }

      const groups = sectors.value.filter(s => s.stocks && s.stocks.length);
      if (!groups.length) { sectorRects.value = []; stockRects.value = []; return; }

      // 全域平均成交量，作為缺量標的的替代權重（等同「無資料則等大」的精神）
      const knownVols = [];
      groups.forEach(s => s.stocks.forEach(st => { if (st.volume && st.volume > 0) knownVols.push(st.volume); }));
      const fallbackVol = knownVols.length ? knownVols.reduce((a, b) => a + b, 0) / knownVols.length : 1;

      const sectorItems = groups.map(s => {
        const stocksResolved = s.stocks.map(st => {
          const rawVol = st.volume && st.volume > 0 ? st.volume : fallbackVol;
          return { raw: st, weight: Math.sqrt(Math.max(rawVol, 1)) };
        });
        const totalWeight = stocksResolved.reduce((a, b) => a + b.weight, 0);
        const pcts = s.stocks.map(st => st.changePct).filter(v => v != null && !isNaN(v));
        const avgPct = pcts.length ? pcts.reduce((a, b) => a + b, 0) / pcts.length : null;
        return { id: s.id, name: s.name, weight: totalWeight, stocks: stocksResolved, count: s.stocks.length, avgPct };
      });

      squarify(sectorItems, { x: 0, y: 0, w, h });

      const newSectorRects = [];
      const newStockRects = [];

      sectorItems.forEach(sg => {
        const headerH = sg.h < 22 ? 0 : Math.min(24, Math.max(15, sg.h * 0.16));
        const pad = sg.h < 40 ? 1 : 3;
        newSectorRects.push({
          id: sg.id, name: sg.name, count: sg.count, avgPct: sg.avgPct,
          x: sg.x, y: sg.y, w: sg.w, h: sg.h,
          headerH, showHeader: headerH >= 14, showMeta: sg.w >= 145
        });

        const innerRect = {
          x: sg.x + pad,
          y: sg.y + headerH + pad,
          w: Math.max(0, sg.w - pad * 2),
          h: Math.max(0, sg.h - headerH - pad * 2)
        };
        squarify(sg.stocks, innerRect);

        sg.stocks.forEach(item => {
          const st = item.raw;
          const bx = item.x ?? 0, by = item.y ?? 0, bw = Math.max(0, (item.w ?? 0) - 2), bh = Math.max(0, (item.h ?? 0) - 2);
          const color = colorForChange(st.changePct);
          let cls, showName, showPrice, showTicker;
          if (bw >= 90 && bh >= 60) { cls = ''; showName = true; showPrice = true; showTicker = true; }
          else if (bw >= 52 && bh >= 36) { cls = 'small'; showName = false; showPrice = true; showTicker = true; }
          else { cls = 'tiny'; showName = false; showPrice = false; showTicker = bw >= 20 && bh >= 14; }

          newStockRects.push({
            id: st.id, ticker: st.ticker, name: st.name, market: st.market,
            price: st.price, changePct: st.changePct, open: st.open, high: st.high, low: st.low, volume: st.volume,
            sectorName: sg.name,
            x: (item.x ?? 0) + 1, y: (item.y ?? 0) + 1, w: bw, h: bh,
            color, textColor: textColorFor(color),
            cls, showName, showPrice, showTicker
          });
        });
      });

      sectorRects.value = newSectorRects;
      stockRects.value = newStockRects;
    }

    function showTooltip(st, e) {
      tooltip.stock = st;
      tooltip.show = true;
      moveTooltip(e);
    }
    function moveTooltip(e) {
      if (!wrapEl.value) return;
      const box = wrapEl.value.getBoundingClientRect();
      const tw = 220, th = 160;
      let x = e.clientX - box.left + 16;
      let y = e.clientY - box.top + 16;
      x = Math.min(Math.max(x, 4), Math.max(box.width - tw - 4, 4));
      y = Math.min(Math.max(y, 4), Math.max(box.height - th - 4, 4));
      tooltip.x = x;
      tooltip.y = y;
    }
    function hideTooltip() { tooltip.show = false; }

    function goToSectorNotes() { location.href = 'sector-notes.html'; }

    // ── Formatters ──
    function fmtPrice(price, market) {
      if (price == null) return '—';
      if (market === 'US') return '$' + price.toFixed(2);
      return price.toFixed(market === 'JP' ? 0 : 2);
    }
    function fmtPct(pct) { return pct == null || isNaN(pct) ? '—' : (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%'; }
    function fmtNum(n) { return n != null ? n.toLocaleString('zh-TW') : '—'; }
    function fmtVol(v) {
      if (v == null) return '—';
      if (v >= 1e8) return (v / 1e8).toFixed(1) + '億';
      if (v >= 1e4) return (v / 1e4).toFixed(0) + '萬';
      return v.toLocaleString('zh-TW');
    }
    function marketFullLabel(m) { return m === 'TW' ? '台股' : m === 'US' ? '美股' : m === 'JP' ? '日股' : (m || ''); }
    function fmtTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleString('zh-TW', { hour12: false, month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    let ro = null;
    function setupResizeObserver() {
      if (!canvasEl.value) return;
      if (window.ResizeObserver) {
        ro = new ResizeObserver(debounce(() => relayout(), 80));
        ro.observe(canvasEl.value);
      }
      window.addEventListener('resize', debounce(relayout, 150));
    }

    function onStorageEvent(e) {
      if (e.key === STORAGE_KEY || e.key === null) {
        load();
        nextTick(relayout);
      }
    }

    onMounted(() => {
      load();
      nextTick(() => {
        setupResizeObserver();
        setTimeout(relayout, 60);
      });
      window.addEventListener('storage', onStorageEvent);
      window.addEventListener('pp-theme-change', () => setTimeout(relayout, 50));
    });

    return {
      sectors, sectorRects, stockRects, loading, statusText, lastUpdated,
      wrapEl, canvasEl, tooltip, legendBuckets,
      hasData, totalSectorCount, totalStockCount,
      refresh, showTooltip, moveTooltip, hideTooltip, goToSectorNotes,
      fmtPrice, fmtPct, fmtNum, fmtVol, marketFullLabel, fmtTime
    };
  }
}).mount('#app');
</script>
</body>
</html>
