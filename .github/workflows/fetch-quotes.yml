name: Fetch daily quotes

# 每天自動抓指數與股價，寫成 data/quotes.json 並 commit 回 repo，
# 讓網站直接讀靜態快照秒開，不必每次在瀏覽器端等即時抓取。
on:
  schedule:
    - cron: '30 6 * * 1-5'    # 14:30 台北（台股收盤後、指數與個股收盤結算完成）
    - cron: '30 8 * * 1-5'    # 16:30 台北（三大法人買賣超結算完成，較指數晚出來，再跑一次補上）
    - cron: '10 22 * * 1-5'   # 美股收盤後（約 18:10 ET / 17:10 ET）
  workflow_dispatch: {}       # 允許手動觸發
  push:
    # 只有「管線本身」被改動時才跑（更新資料檔不會觸發，避免無限迴圈）
    branches: ['**']
    paths:
      - '.github/workflows/fetch-quotes.yml'
      - 'scripts/fetch-quotes.mjs'
      - 'data/us-symbols.json'

permissions:
  contents: write

concurrency:
  group: fetch-quotes
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch quotes
        run: node scripts/fetch-quotes.mjs

      - name: Commit updated snapshot
        run: |
          git config user.name "pptools-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/quotes.json
          if git diff --cached --quiet; then
            echo "報價無變化，略過 commit。"
          else
            git commit -m "chore(data): 自動更新報價快照 [skip ci]"
            git push
          fi
