<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PPtools — 個人投資工具平台</title>
<link rel="stylesheet" href="pp-ui.css">
<script src="pp-theme.js"></script>
<style>
  :root {
    --sidebar-w: 244px;
    --header-h: 56px;
    --shell-gap: 12px;
  }

  html, body { height: 100%; }
  body { overflow: hidden; }

  .shell {
    display: flex;
    gap: var(--shell-gap);
    height: 100vh;
    height: 100dvh; /* iOS Safari 網址列伸縮時 100vh 會溢出，dvh 修正 */
    padding: var(--shell-gap);
    padding-top: max(var(--shell-gap), env(safe-area-inset-top));
    padding-bottom: max(var(--shell-gap), env(safe-area-inset-bottom));
  }

  /* ── 懸浮玻璃側欄 ── */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-radius: var(--radius-lg);
    z-index: 100;
    transition: transform .32s cubic-bezier(.32, .72, .28, 1);
  }
  .sidebar-brand { padding: 22px 20px 16px; }
  .sidebar-brand h1 {
    font-size: 19px;
    font-weight: 800;
    letter-spacing: .3px;
    background: linear-gradient(120deg, var(--accent), var(--purple));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .sidebar-brand p { font-size: 11px; color: var(--text-muted); margin-top: 3px; letter-spacing: .2px; }

  .sidebar-nav { flex: 1; padding: 4px 12px 12px; overflow-y: auto; }
  .nav-section {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.4px;
    color: var(--text-muted);
    opacity: .65;
    padding: 18px 12px 7px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 10px 13px;
    border-radius: 13px;
    color: var(--text-muted);
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    user-select: none;
    border: 1px solid transparent;
    transition: background .18s, color .18s, transform .18s, border-color .18s;
  }
  .nav-item:hover { background: var(--surface-alt); color: var(--text); }
  .nav-item:active { transform: scale(.98); }
  .nav-item.active {
    background: var(--accent-light);
    border-color: color-mix(in srgb, var(--accent) 25%, transparent);
    color: var(--text);
    font-weight: 650;
    box-shadow: inset 0 1px 0 var(--glass-inner);
  }
  .nav-item.active .nav-icon { transform: scale(1.08); }
  .nav-icon { width: 22px; text-align: center; font-size: 16px; flex-shrink: 0; transition: transform .18s; }

  .sidebar-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--stroke);
    font-size: 11px;
    color: var(--text-muted);
    opacity: .6;
  }

  /* ── 主區域 ── */
  .main { flex: 1; display: flex; flex-direction: column; gap: var(--shell-gap); min-width: 0; }

  .header {
    height: var(--header-h);
    border-radius: 999px;
    display: flex;
    align-items: center;
    padding: 0 10px 0 20px;
    gap: 12px;
    flex-shrink: 0;
  }
  .menu-btn {
    display: none;
    background: none;
    border: none;
    color: var(--text);
    font-size: 21px;
    cursor: pointer;
    padding: 6px;
    margin-left: -6px;
    border-radius: 10px;
  }
  .menu-btn:active { background: var(--surface-alt); }
  .header-title { font-size: 14.5px; font-weight: 650; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  .content {
    flex: 1;
    min-height: 0;
    border-radius: var(--radius-lg);
    border: 1px solid var(--glass-border);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    position: relative;
    background: transparent;
  }
  .content-frame { width: 100%; height: 100%; border: none; display: block; background: transparent; }

  /* ── 行動版遮罩（毛玻璃） ── */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 12, 25, .35);
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
    z-index: 99;
    opacity: 0;
    transition: opacity .28s;
  }

  /* ── 行動版 ── */
  @media (max-width: 768px) {
    .shell { padding: 8px; padding-top: max(8px, env(safe-area-inset-top)); padding-bottom: max(8px, env(safe-area-inset-bottom)); }
    .sidebar {
      position: fixed;
      top: max(8px, env(safe-area-inset-top));
      left: 8px;
      bottom: max(8px, env(safe-area-inset-bottom));
      transform: translateX(calc(-100% - 16px));
      box-shadow: var(--shadow);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.open { display: block; opacity: 1; }
    .menu-btn { display: block; }
    .header { padding-left: 14px; }
  }

  /* ── 歡迎頁 ── */
  .welcome {
    height: 100%;
    overflow-y: auto; /* 手機上卡片超出視窗高度時必須可捲動 */
    -webkit-overflow-scrolling: touch;
    display: flex;
    justify-content: center;
  }
  .welcome-inner {
    width: 100%;
    max-width: 720px;
    padding: clamp(28px, 6vh, 64px) 22px 40px;
    text-align: center;
  }
  .welcome-inner h2 { font-size: clamp(22px, 4vw, 30px); font-weight: 800; margin-bottom: 10px; letter-spacing: .3px; }
  .welcome-inner > p { font-size: 14px; color: var(--text-muted); line-height: 1.7; }

  .module-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 14px;
    margin-top: 30px;
  }
  .module-card {
    padding: 22px 16px 18px;
    cursor: pointer;
    text-align: center;
    transition: transform .22s cubic-bezier(.3, .7, .4, 1.2), box-shadow .22s;
  }
  .module-card:hover { transform: translateY(-3px); box-shadow: var(--shadow), inset 0 1px 0 var(--glass-inner); }
  .module-card:active { transform: scale(.97); }
  .module-card .card-icon {
    font-size: 26px;
    width: 56px; height: 56px;
    margin: 0 auto 12px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 18px;
    background: var(--accent-light);
    box-shadow: inset 0 1px 0 var(--glass-inner);
  }
  .module-card .card-title { font-size: 13.5px; font-weight: 650; }
  .module-card .card-desc { font-size: 11px; color: var(--text-muted); margin-top: 5px; line-height: 1.5; }

  /* ── 懸浮直播視窗 ── */
  .pip-window {
    position: fixed;
    z-index: 9000;
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: 0 16px 60px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.08);
    display: flex;
    flex-direction: column;
    background: #000;
    min-width: 280px;
    min-height: 200px;
  }
  .pip-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: rgba(20,22,35,.92);
    cursor: grab;
    user-select: none;
    flex-shrink: 0;
  }
  .pip-bar:active { cursor: grabbing; }
  .pip-bar-title { font-size: 11px; font-weight: 650; color: #ccc; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pip-bar-btn {
    background: none; border: none; color: #999; font-size: 14px;
    cursor: pointer; padding: 2px 5px; border-radius: 6px; line-height: 1;
  }
  .pip-bar-btn:hover { color: #fff; background: rgba(255,255,255,.1); }
  .pip-body { flex: 1; position: relative; }
  .pip-body iframe { width: 100%; height: 100%; border: none; display: block; }
  .pip-ch-bar {
    display: flex; gap: 3px; padding: 5px 10px; background: rgba(20,22,35,.92);
    flex-shrink: 0;
  }
  .pip-ch-btn {
    padding: 3px 10px; font-size: 10px; font-weight: 600; cursor: pointer;
    color: #aaa; border-radius: 999px; white-space: nowrap;
    background: rgba(255,255,255,.06); border: none; font-family: inherit;
  }
  .pip-ch-btn:hover { color: #fff; }
  .pip-ch-btn.active { color: #fff; background: rgba(91,140,255,.5); }
  .pip-resize {
    position: absolute; bottom: 0; right: 0; width: 18px; height: 18px;
    cursor: nwse-resize; z-index: 2;
  }
  .pip-resize::after {
    content: ''; position: absolute; right: 3px; bottom: 3px;
    width: 10px; height: 10px;
    border-right: 2px solid rgba(255,255,255,.3);
    border-bottom: 2px solid rgba(255,255,255,.3);
  }
</style>
</head>
<body>

<div class="shell">
  <!-- 行動版遮罩 -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- 側欄 -->
  <aside class="sidebar glass" id="sidebar">
    <div class="sidebar-brand">
      <h1>PPtools</h1>
      <p>個人投資工具平台</p>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <!-- Populated by JS -->
    </nav>
    <div class="sidebar-footer">
      新增模組：編輯 modules 陣列
    </div>
  </aside>

  <!-- 主區域 -->
  <div class="main">
    <header class="header glass">
      <button class="menu-btn" onclick="toggleSidebar()" aria-label="開啟選單">&#9776;</button>
      <span class="header-title" id="headerTitle">總覽</span>
      <div class="header-right">
        <button class="btn btn-sm" onclick="togglePip()" id="pipBtn" title="非凡新聞直播懸浮窗">📺</button>
        <button class="btn btn-sm" onclick="openDataHub()" id="syncBtn" title="資料中心">☁ 同步</button>
        <button class="btn btn-sm" onclick="onThemeClick()" id="themeBtn">⚙ 系統</button>
      </div>
    </header>

    <div class="content">
      <div id="welcomeView" class="welcome">
        <div class="welcome-inner">
          <h2>歡迎使用 PPtools</h2>
          <p>從左側選單選擇模組，或點擊下方卡片快速開始。</p>
          <div class="module-grid" id="moduleGrid"></div>
        </div>
      </div>
      <iframe id="contentFrame" class="content-frame" style="display:none" title="模組內容" allowfullscreen allow="fullscreen; autoplay; encrypted-media; picture-in-picture; clipboard-write; web-share"></iframe>
    </div>
  </div>
</div>

<!-- 懸浮直播視窗 -->
<div class="pip-window" id="pipWindow" style="display:none; width:400px; height:260px; right:24px; bottom:24px;">
  <div class="pip-bar" id="pipBar">
    <span class="pip-bar-title" id="pipTitle">📺 非凡新聞直播</span>
    <button class="pip-bar-btn" onclick="pipSize('sm')" title="小">S</button>
    <button class="pip-bar-btn" onclick="pipSize('md')" title="中">M</button>
    <button class="pip-bar-btn" onclick="pipSize('lg')" title="大">L</button>
    <button class="pip-bar-btn" onclick="togglePip()" title="關閉">✕</button>
  </div>
  <div class="pip-ch-bar" id="pipChannels"></div>
  <div class="pip-body">
    <iframe id="pipFrame" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen loading="lazy"></iframe>
  </div>
  <div class="pip-resize" id="pipResize"></div>
</div>

<script src="pp-store.js"></script>
<script>
// ════════════════════════════════════════════
//  Module Registry — 新增模組只需在這裡加一筆
// ════════════════════════════════════════════
const MODULES = [
  {
    id: 'watchlist',
    title: '觀察清單',
    icon: '📋',
    desc: '台美股標的追蹤、走勢與財務資訊',
    src: 'watchlist.html',
    section: '分析工具'
  },
  {
    id: 'market',
    title: '市場指標',
    icon: '📊',
    desc: '指數日內走勢、非凡新聞直播、自選股報價與外資期貨部位',
    src: 'market.html',
    section: '分析工具'
  },
  {
    id: 'calendar',
    title: '投資行事曆',
    icon: '📅',
    desc: '經濟事件與觀察標的日程',
    src: 'calendar.html',
    section: '分析工具'
  },
  {
    id: 'forecast',
    title: '財務預測',
    icon: '📈',
    desc: '關注標的財務預測整理',
    src: 'forecast.html',
    section: '分析工具'
  },
  {
    id: 'sector-notes',
    title: '產業族群筆記',
    icon: '🏭',
    desc: '依產業板塊分類看盤，搭配研究筆記',
    src: 'sector-notes.html',
    section: '分析工具'
  },
  {
    id: 'heatmap',
    title: '產業熱力圖',
    icon: '🗺',
    desc: '個股依產業分類的漲跌幅色塊圖',
    src: 'heatmap.html',
    section: '分析工具'
  },
  {
    id: 'position',
    title: '部位控管',
    icon: '💼',
    desc: '庫存與股票部位管理',
    src: 'return_equity.html',
    section: '交易管理'
  },
  {
    id: 'budget',
    title: '預算管理',
    icon: '🧮',
    desc: '資金分配與預算追蹤',
    src: 'budget.html',
    section: '交易管理'
  },
  {
    id: 'datahub',
    title: '資料中心',
    icon: '☁️',
    desc: '跨裝置同步、備份與版本還原',
    src: 'datahub.html',
    section: '系統'
  }
];

let currentModule = null;

function buildNav() {
  const nav = document.getElementById('sidebarNav');
  const grid = document.getElementById('moduleGrid');
  let lastSection = '';

  // Home item
  const home = document.createElement('div');
  home.className = 'nav-item active';
  home.dataset.id = '__home';
  home.innerHTML = '<span class="nav-icon">⌂</span> 總覽';
  home.onclick = () => loadModule(null);
  nav.appendChild(home);

  MODULES.forEach(m => {
    if (m.section !== lastSection) {
      const sec = document.createElement('div');
      sec.className = 'nav-section';
      sec.textContent = m.section;
      nav.appendChild(sec);
      lastSection = m.section;
    }
    const item = document.createElement('div');
    item.className = 'nav-item';
    item.dataset.id = m.id;
    item.innerHTML = `<span class="nav-icon">${m.icon}</span> ${m.title}`;
    item.onclick = () => loadModule(m);
    nav.appendChild(item);

    const card = document.createElement('div');
    card.className = 'module-card glass';
    card.onclick = () => loadModule(m);
    card.innerHTML = `<div class="card-icon">${m.icon}</div><div class="card-title">${m.title}</div><div class="card-desc">${m.desc}</div>`;
    grid.appendChild(card);
  });
}

function loadModule(mod) {
  const frame = document.getElementById('contentFrame');
  const welcome = document.getElementById('welcomeView');
  const title = document.getElementById('headerTitle');

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

  if (!mod) {
    frame.style.display = 'none';
    frame.src = '';
    welcome.style.display = 'flex';
    title.textContent = '總覽';
    document.querySelector('[data-id="__home"]').classList.add('active');
    currentModule = null;
  } else {
    welcome.style.display = 'none';
    frame.style.display = 'block';
    frame.src = mod.src;
    title.textContent = mod.title;
    document.querySelector(`[data-id="${mod.id}"]`).classList.add('active');
    currentModule = mod;
  }

  // close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

// ── 主題：引擎在 pp-theme.js，storage 事件會同步到 iframe 內的模組 ──
const THEME_LABEL = { system: '⚙ 系統', light: '☀ 淺色', dark: '☾ 深色' };
function refreshThemeBtn() {
  document.getElementById('themeBtn').textContent = THEME_LABEL[PPTheme.get()];
}
function onThemeClick() {
  PPTheme.cycle();
  refreshThemeBtn();
}

// Data hub shortcut
function openDataHub() {
  const mod = MODULES.find(m => m.id === 'datahub');
  if (mod) loadModule(mod);
}

// Sync button hint — show last backup time from PPStore meta
function refreshSyncHint() {
  const btn = document.getElementById('syncBtn');
  if (!btn || !window.PPStore) return;
  const m = PPStore.getMeta();
  if (m.lastPushAt) {
    const d = new Date(m.lastPushAt);
    btn.title = '上次備份：' + d.toLocaleString('zh-TW', { hour12: false });
  }
}

// ── 懸浮直播視窗 ──
const PIP_KEY = 'pptools-pip';
const PIP_CHANNELS = [
  { id: 'ustvbiz', label: '投資看非凡', video: 'eA6Aczd3FZM' },
  { id: 'ustv', label: '非凡電視', video: 'TKf1nKiUXVI' },
];
const PIP_SIZES = { sm: [320, 210], md: [440, 280], lg: [640, 400] };

function loadPipState() {
  try { return JSON.parse(localStorage.getItem(PIP_KEY)) || {}; } catch { return {}; }
}
function savePipState(patch) {
  const s = { ...loadPipState(), ...patch };
  localStorage.setItem(PIP_KEY, JSON.stringify(s));
}

function togglePip() {
  const w = document.getElementById('pipWindow');
  const show = w.style.display === 'none';
  w.style.display = show ? 'flex' : 'none';
  savePipState({ show });
  if (show) {
    const st = loadPipState();
    setPipChannel(st.channel || PIP_CHANNELS[0].id);
  } else {
    document.getElementById('pipFrame').src = '';
  }
}

function setPipChannel(id) {
  const ch = PIP_CHANNELS.find(c => c.id === id) || PIP_CHANNELS[0];
  document.getElementById('pipFrame').src = 'https://www.youtube.com/embed/' + ch.video + '?rel=0&autoplay=1';
  document.getElementById('pipTitle').textContent = '📺 ' + ch.label;
  savePipState({ channel: ch.id });
  document.querySelectorAll('.pip-ch-btn').forEach(b => b.classList.toggle('active', b.dataset.id === ch.id));
}

function pipSize(size) {
  const [w, h] = PIP_SIZES[size] || PIP_SIZES.md;
  const win = document.getElementById('pipWindow');
  win.style.width = w + 'px';
  win.style.height = h + 'px';
  savePipState({ w, h });
}

function buildPipChannels() {
  const bar = document.getElementById('pipChannels');
  PIP_CHANNELS.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'pip-ch-btn';
    btn.dataset.id = ch.id;
    btn.textContent = ch.label;
    btn.onclick = () => setPipChannel(ch.id);
    bar.appendChild(btn);
  });
}

function initPipDrag() {
  const win = document.getElementById('pipWindow');
  const bar = document.getElementById('pipBar');
  let dragging = false, ox, oy;

  bar.addEventListener('pointerdown', e => {
    if (e.target.closest('.pip-bar-btn')) return;
    dragging = true;
    ox = e.clientX - win.offsetLeft;
    oy = e.clientY - win.offsetTop;
    bar.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  bar.addEventListener('pointermove', e => {
    if (!dragging) return;
    let x = Math.max(0, Math.min(window.innerWidth - 80, e.clientX - ox));
    let y = Math.max(0, Math.min(window.innerHeight - 40, e.clientY - oy));
    win.style.left = x + 'px';
    win.style.top = y + 'px';
    win.style.right = 'auto';
    win.style.bottom = 'auto';
  });
  bar.addEventListener('pointerup', e => {
    if (!dragging) return;
    dragging = false;
    savePipState({ x: win.offsetLeft, y: win.offsetTop });
  });

  const handle = document.getElementById('pipResize');
  let resizing = false, startW, startH, startX, startY;
  handle.addEventListener('pointerdown', e => {
    resizing = true;
    startW = win.offsetWidth;
    startH = win.offsetHeight;
    startX = e.clientX;
    startY = e.clientY;
    handle.setPointerCapture(e.pointerId);
    e.preventDefault();
    e.stopPropagation();
  });
  handle.addEventListener('pointermove', e => {
    if (!resizing) return;
    const w = Math.max(280, startW + e.clientX - startX);
    const h = Math.max(180, startH + e.clientY - startY);
    win.style.width = w + 'px';
    win.style.height = h + 'px';
  });
  handle.addEventListener('pointerup', e => {
    if (!resizing) return;
    resizing = false;
    savePipState({ w: win.offsetWidth, h: win.offsetHeight });
  });
}

function restorePip() {
  const st = loadPipState();
  const win = document.getElementById('pipWindow');
  if (st.w) win.style.width = st.w + 'px';
  if (st.h) win.style.height = st.h + 'px';
  if (st.x != null) { win.style.left = st.x + 'px'; win.style.right = 'auto'; }
  if (st.y != null) { win.style.top = st.y + 'px'; win.style.bottom = 'auto'; }
  if (st.show) {
    win.style.display = 'flex';
    setPipChannel(st.channel || PIP_CHANNELS[0].id);
  }
}

buildPipChannels();
initPipDrag();
restorePip();

// Init
buildNav();
refreshThemeBtn();

// PPStore — 自動備份引擎（只在 portal shell 運作）
if (window.PPStore) {
  PPStore.startAuto();
  refreshSyncHint();
  setInterval(refreshSyncHint, 60 * 1000);
}
</script>
</body>
</html>
