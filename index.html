<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PPtools — 個人投資工具平台</title>
<link rel="stylesheet" href="pp-ui.css">
<script>window.__PP_SHELL__ = true;</script>
<script src="pp-theme.js"></script>
<style>
  :root {
    --sidebar-w: 244px;
    --header-h: 56px;
    --shell-gap: 12px;
  }

  html, body { height: 100%; }
  body { overflow: hidden; }

  .shell {
    display: flex;
    gap: var(--shell-gap);
    height: 100vh;
    height: 100dvh; /* iOS Safari 網址列伸縮時 100vh 會溢出，dvh 修正 */
    padding: var(--shell-gap);
    padding-top: max(var(--shell-gap), env(safe-area-inset-top));
    padding-bottom: max(var(--shell-gap), env(safe-area-inset-bottom));
  }

  /* ── 懸浮玻璃側欄 ── */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-radius: var(--radius-lg);
    z-index: 100;
    transition: transform .32s cubic-bezier(.32, .72, .28, 1);
  }
  .sidebar-brand { padding: 22px 20px 16px; }
  .sidebar-brand h1 {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  }
  .sidebar-brand p { font-size: 11px; color: var(--text-muted); margin-top: 3px; letter-spacing: .2px; }

  .sidebar-nav { flex: 1; padding: 4px 12px 12px; overflow-y: auto; }
  .nav-section {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.4px;
    color: var(--text-muted);
    opacity: .65;
    padding: 18px 12px 7px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 10px 13px 10px 10px;
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    user-select: none;
    border: 1px solid transparent;
    border-left: 3px solid transparent;
    transition: background .15s, color .15s, border-color .15s;
  }
  .nav-item:hover { background: var(--surface-alt); color: var(--text); }
  .nav-item.active {
    background: var(--accent-light);
    border-left-color: var(--accent);
    color: var(--accent);
    font-weight: 650;
  }
  .nav-icon { width: 22px; text-align: center; font-size: 16px; flex-shrink: 0; }

  .sidebar-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--stroke);
    font-size: 11px;
    color: var(--text-muted);
    opacity: .6;
  }

  /* ── 主區域 ── */
  .main { flex: 1; display: flex; flex-direction: column; gap: var(--shell-gap); min-width: 0; }

  .header {
    height: var(--header-h);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    padding: 0 10px 0 20px;
    gap: 12px;
    flex-shrink: 0;
  }
  .menu-btn {
    display: none;
    background: none;
    border: none;
    color: var(--text);
    font-size: 21px;
    cursor: pointer;
    padding: 6px;
    margin-left: -6px;
    border-radius: 10px;
  }
  .menu-btn:active { background: var(--surface-alt); }
  .header-title { font-size: 14.5px; font-weight: 650; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  .content {
    flex: 1;
    min-height: 0;
    border-radius: var(--radius-lg);
    border: 1px solid var(--glass-border);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    position: relative;
    background: transparent;
  }
  .content-frame { width: 100%; height: 100%; border: none; display: block; background: transparent; }

  /* ── 行動版遮罩（毛玻璃） ── */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .5);
    z-index: 99;
    opacity: 0;
    transition: opacity .28s;
  }

  /* ── 行動版 ── */
  @media (max-width: 768px) {
    .shell { padding: 8px; padding-top: max(8px, env(safe-area-inset-top)); padding-bottom: max(8px, env(safe-area-inset-bottom)); }
    .sidebar {
      position: fixed;
      top: max(8px, env(safe-area-inset-top));
      left: 8px;
      bottom: max(8px, env(safe-area-inset-bottom));
      transform: translateX(calc(-100% - 16px));
      box-shadow: var(--shadow);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.open { display: block; opacity: 1; }
    .menu-btn { display: block; }
    .header { padding-left: 14px; }
  }

  /* ── 總覽（可自訂儀表板） ── */
  .welcome {
    height: 100%;
    overflow-y: auto; /* 面板超出視窗高度時必須可捲動 */
    -webkit-overflow-scrolling: touch;
  }
  .welcome-inner {
    width: 100%;
    max-width: 1180px;
    margin: 0 auto;
    padding: 20px 22px 40px;
  }

  .dashboard-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .dashboard-head h2 { font-size: 18px; font-weight: 800; letter-spacing: .4px; }
  .dashboard-head .dash-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 2px;
  }
  .dashboard-actions { position: relative; }

  .add-panel-menu {
    display: none;
    flex-direction: column;
    gap: 2px;
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 220px;
    max-height: 340px;
    overflow-y: auto;
    padding: 6px;
    z-index: 50;
  }
  .add-panel-menu.open { display: flex; }
  .add-panel-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
  }
  .add-panel-item:hover { background: var(--surface-alt); }
  .add-panel-item.disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }
  .add-panel-item .api-icon { width: 20px; text-align: center; flex-shrink: 0; }

  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    padding-bottom: 20px;
  }
  .dash-panel { display: flex; flex-direction: column; overflow: hidden; }
  .dash-panel[data-span="2"] { grid-column: span 2; }
  .dash-panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 8px 9px 12px;
    border-bottom: 1px solid var(--stroke);
    cursor: grab;
    user-select: none;
    flex-shrink: 0;
  }
  .dash-panel-header:active { cursor: grabbing; }
  .dash-panel-header .dp-handle { color: var(--text-muted); font-size: 14px; flex-shrink: 0; }
  .dash-panel-header .dp-icon { font-size: 14px; flex-shrink: 0; }
  .dash-panel-header .dp-title {
    flex: 1;
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    color: var(--accent);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .dash-panel-header .dp-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: var(--radius-sm);
    line-height: 1;
    flex-shrink: 0;
  }
  .dash-panel-header .dp-btn:hover { background: var(--surface-alt); color: var(--text); }
  .dash-panel-body { flex: 1; min-height: 0; position: relative; }
  .dash-panel-body iframe { width: 100%; height: 100%; border: none; display: block; background: transparent; }
  .dash-panel.drag-over { outline: 2px dashed var(--accent); outline-offset: -2px; }
  .dashboard-grid.dragging .dash-panel-body iframe { pointer-events: none; }
  .dash-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 13px;
    grid-column: 1 / -1;
  }

  @media (max-width: 768px) {
    .dashboard-grid { grid-template-columns: 1fr; }
    .dash-panel[data-span="2"] { grid-column: span 1; }
  }

  /* ── 字級：外殼 chrome 依 --pp-scale 縮放字體（模組內容由各自 zoom 處理） ── */
  .sidebar-brand h1 { font-size: calc(18px * var(--pp-scale, 1)); }
  .sidebar-brand p  { font-size: calc(11px * var(--pp-scale, 1)); }
  .nav-section      { font-size: calc(10px * var(--pp-scale, 1)); }
  .nav-item         { font-size: calc(13.5px * var(--pp-scale, 1)); }
  .nav-icon         { font-size: calc(16px * var(--pp-scale, 1)); }
  .header-title     { font-size: calc(14.5px * var(--pp-scale, 1)); }
  .dashboard-head h2 { font-size: calc(18px * var(--pp-scale, 1)); }
  .dash-panel-header .dp-title { font-size: calc(11.5px * var(--pp-scale, 1)); }
</style>
</head>
<body>

<div class="shell">
  <!-- 行動版遮罩 -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- 側欄 -->
  <aside class="sidebar glass" id="sidebar">
    <div class="sidebar-brand">
      <h1>PPtools</h1>
      <p>個人投資工具平台</p>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <!-- Populated by JS -->
    </nav>
    <div class="sidebar-footer">
      新增模組：編輯 modules 陣列
    </div>
  </aside>

  <!-- 主區域 -->
  <div class="main">
    <header class="header glass">
      <button class="menu-btn" onclick="toggleSidebar()" aria-label="開啟選單">&#9776;</button>
      <span class="header-title" id="headerTitle">總覽</span>
      <div class="header-right">
        <button class="btn btn-sm" onclick="openAddPanelFromHeader()" id="addPanelHeaderBtn" title="加入儀表板面板" style="display:none">＋ 面板</button>
        <button class="btn btn-sm" onclick="openDataHub()" id="syncBtn" title="資料中心">☁ 同步</button>
        <button class="btn btn-sm" onclick="onFontClick()" id="fontBtn" title="字級大小（點擊切換：標準→大→特大→小）">🔤 標準</button>
        <button class="btn btn-sm" onclick="onThemeClick()" id="themeBtn">⚙ 系統</button>
      </div>
    </header>

    <div class="content">
      <div id="welcomeView" class="welcome">
        <div class="welcome-inner">
          <div class="dashboard-head">
            <div>
              <h2>總覽</h2>
              <div class="dash-tag">DASHBOARD</div>
            </div>
            <div class="dashboard-actions">
              <button class="btn btn-sm btn-primary" id="addPanelBtn" onclick="toggleAddPanelMenu(event)">＋ 加入面板</button>
              <div class="add-panel-menu glass" id="addPanelMenu"></div>
            </div>
          </div>
          <div class="dashboard-grid" id="dashboardGrid"></div>
        </div>
      </div>
      <iframe id="contentFrame" class="content-frame" style="display:none" title="模組內容" allowfullscreen allow="fullscreen; autoplay; encrypted-media; picture-in-picture; clipboard-write; web-share"></iframe>
    </div>
  </div>
</div>

<script src="pp-store.js"></script>
<script>
// ════════════════════════════════════════════
//  Module Registry — 新增模組只需在這裡加一筆
// ════════════════════════════════════════════
const MODULES = [
  {
    id: 'market',
    title: '市場指標',
    icon: '📊',
    desc: '全市場總覽：指數、資金流向、類股漲跌、排行與期貨籌碼',
    src: 'market.html',
    section: '看盤'
  },
  {
    id: 'watchlist',
    title: '觀察清單',
    icon: '📋',
    desc: '台美股標的追蹤、走勢與財務資訊',
    src: 'watchlist.html',
    section: '看盤'
  },
  {
    id: 'sector-notes',
    title: '產業族群筆記',
    icon: '🏭',
    desc: '依產業板塊分類看盤，搭配研究筆記',
    src: 'sector-notes.html',
    section: '看盤'
  },
  {
    id: 'calendar',
    title: '投資行事曆',
    icon: '📅',
    desc: '經濟事件與觀察標的日程',
    src: 'calendar.html',
    section: '研究'
  },
  {
    id: 'forecast',
    title: '財務預測',
    icon: '📈',
    desc: '關注標的財務預測整理',
    src: 'forecast.html',
    section: '研究'
  },
  {
    id: 'strategy',
    title: '策略百科',
    icon: '📖',
    desc: '交易策略記錄：假說、進出場、回測與實戰筆記',
    src: 'strategy.html',
    section: '研究'
  },
  {
    id: 'position',
    title: '部位控管',
    icon: '💼',
    desc: '庫存與股票部位管理',
    src: 'return_equity.html',
    section: '交易管理'
  },
  {
    id: 'budget',
    title: '預算管理',
    icon: '🧮',
    desc: '資金分配與預算追蹤',
    src: 'budget.html',
    section: '交易管理'
  },
  {
    id: 'datahub',
    title: '資料中心',
    icon: '☁️',
    desc: '跨裝置同步、備份與版本還原',
    src: 'datahub.html',
    section: '系統'
  }
];

let currentModule = null;

function buildNav() {
  const nav = document.getElementById('sidebarNav');
  let lastSection = '';

  // Home item
  const home = document.createElement('div');
  home.className = 'nav-item active';
  home.dataset.id = '__home';
  home.innerHTML = '<span class="nav-icon">⌂</span> 總覽';
  home.onclick = () => loadModule(null);
  nav.appendChild(home);

  MODULES.forEach(m => {
    if (m.section !== lastSection) {
      const sec = document.createElement('div');
      sec.className = 'nav-section';
      sec.textContent = m.section;
      nav.appendChild(sec);
      lastSection = m.section;
    }
    const item = document.createElement('div');
    item.className = 'nav-item';
    item.dataset.id = m.id;
    item.innerHTML = `<span class="nav-icon">${m.icon}</span> ${m.title}`;
    item.onclick = () => loadModule(m);
    nav.appendChild(item);
  });
}

// ════════════════════════════════════════════
//  可自訂儀表板 — 總覽頁的模組化面板配置
// ════════════════════════════════════════════
const DASH_KEY = 'pptools-dashboard';
const DASH_HEIGHT_PX = { S: 320, M: 480, L: 680 };
const DASH_HEIGHT_ORDER = ['S', 'M', 'L'];

function defaultDashboardCfg() {
  return {
    panels: [
      { id: 'p-market', moduleId: 'market', span: 2, height: 'M' },
      { id: 'p-watchlist', moduleId: 'watchlist', span: 1, height: 'M' },
      { id: 'p-sector-notes', moduleId: 'sector-notes', span: 1, height: 'M' }
    ]
  };
}

function loadDashboardCfg() {
  try {
    const raw = localStorage.getItem(DASH_KEY);
    if (raw) {
      const cfg = JSON.parse(raw);
      if (cfg && Array.isArray(cfg.panels)) return cfg;
    }
  } catch (e) {}
  return defaultDashboardCfg();
}

function saveDashboardCfg() {
  try { localStorage.setItem(DASH_KEY, JSON.stringify(dashCfg)); } catch (e) {}
}

function panelUid() {
  return 'p-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

let dashCfg = loadDashboardCfg();
let dashDragIndex = null;

function renderDashboard() {
  const grid = document.getElementById('dashboardGrid');
  if (!grid) return;
  grid.innerHTML = '';

  if (!dashCfg.panels.length) {
    const empty = document.createElement('div');
    empty.className = 'dash-empty';
    empty.textContent = '尚未加入任何面板，點擊右上角「＋ 加入面板」開始建立你的儀表板。';
    grid.appendChild(empty);
    renderAddPanelMenu();
    return;
  }

  dashCfg.panels.forEach((p, idx) => {
    const mod = MODULES.find(m => m.id === p.moduleId);
    if (!mod) return;

    const panel = document.createElement('div');
    panel.className = 'dash-panel glass';
    panel.dataset.span = p.span;
    panel.dataset.index = idx;

    const header = document.createElement('div');
    header.className = 'dash-panel-header';
    header.draggable = true;
    header.innerHTML =
      '<span class="dp-handle">⠿</span>' +
      '<span class="dp-icon">' + mod.icon + '</span>' +
      '<span class="dp-title">' + mod.title + '</span>' +
      '<button type="button" class="dp-btn" data-act="span" title="切換寬度">' + (p.span === 2 ? '◧' : '◨') + '</button>' +
      '<button type="button" class="dp-btn" data-act="height" title="切換高度">' + p.height + '</button>' +
      '<button type="button" class="dp-btn" data-act="open" title="全螢幕開啟">↗</button>' +
      '<button type="button" class="dp-btn" data-act="remove" title="移除面板">×</button>';

    header.addEventListener('dragstart', () => {
      dashDragIndex = idx;
      grid.classList.add('dragging');
    });
    header.addEventListener('dragend', () => {
      dashDragIndex = null;
      grid.classList.remove('dragging');
      grid.querySelectorAll('.dash-panel.drag-over').forEach(el => el.classList.remove('drag-over'));
    });

    header.querySelector('[data-act="span"]').onclick = () => {
      p.span = p.span === 2 ? 1 : 2;
      saveDashboardCfg();
      renderDashboard();
    };
    header.querySelector('[data-act="height"]').onclick = () => {
      p.height = DASH_HEIGHT_ORDER[(DASH_HEIGHT_ORDER.indexOf(p.height) + 1) % DASH_HEIGHT_ORDER.length];
      saveDashboardCfg();
      renderDashboard();
    };
    header.querySelector('[data-act="open"]').onclick = () => loadModule(mod);
    header.querySelector('[data-act="remove"]').onclick = () => {
      dashCfg.panels = dashCfg.panels.filter(x => x.id !== p.id);
      saveDashboardCfg();
      renderDashboard();
    };

    panel.addEventListener('dragover', (e) => {
      if (dashDragIndex === null) return;
      e.preventDefault();
      panel.classList.add('drag-over');
    });
    panel.addEventListener('dragleave', () => panel.classList.remove('drag-over'));
    panel.addEventListener('drop', (e) => {
      e.preventDefault();
      panel.classList.remove('drag-over');
      grid.classList.remove('dragging');
      const from = dashDragIndex;
      dashDragIndex = null;
      if (from === null || from === idx) return;
      const moved = dashCfg.panels.splice(from, 1)[0];
      dashCfg.panels.splice(idx, 0, moved);
      saveDashboardCfg();
      renderDashboard();
    });

    const body = document.createElement('div');
    body.className = 'dash-panel-body';
    body.style.height = (DASH_HEIGHT_PX[p.height] || DASH_HEIGHT_PX.M) + 'px';
    const iframe = document.createElement('iframe');
    iframe.loading = 'lazy';
    iframe.title = mod.title;
    iframe.src = mod.src;
    body.appendChild(iframe);

    panel.appendChild(header);
    panel.appendChild(body);
    grid.appendChild(panel);
  });

  renderAddPanelMenu();
}

function renderAddPanelMenu() {
  const menu = document.getElementById('addPanelMenu');
  if (!menu) return;
  menu.innerHTML = '';
  const usedIds = new Set(dashCfg.panels.map(p => p.moduleId));
  MODULES.forEach(m => {
    const used = usedIds.has(m.id);
    const item = document.createElement('div');
    item.className = 'add-panel-item' + (used ? ' disabled' : '');
    item.innerHTML = '<span class="api-icon">' + m.icon + '</span><span>' + m.title + '</span>';
    if (!used) {
      item.onclick = () => {
        dashCfg.panels.push({ id: panelUid(), moduleId: m.id, span: 1, height: 'M' });
        saveDashboardCfg();
        closeAddPanelMenu();
        renderDashboard();
      };
    }
    menu.appendChild(item);
  });
}

function toggleAddPanelMenu(e) {
  if (e) e.stopPropagation();
  const menu = document.getElementById('addPanelMenu');
  if (menu) menu.classList.toggle('open');
}
function closeAddPanelMenu() {
  const menu = document.getElementById('addPanelMenu');
  if (menu) menu.classList.remove('open');
}
function openAddPanelFromHeader() {
  const welcome = document.getElementById('welcomeView');
  if (welcome) welcome.scrollTop = 0;
  const menu = document.getElementById('addPanelMenu');
  if (menu) menu.classList.add('open');
}
document.addEventListener('click', (e) => {
  const menu = document.getElementById('addPanelMenu');
  const btn = document.getElementById('addPanelBtn');
  if (!menu || !menu.classList.contains('open')) return;
  if (menu.contains(e.target) || (btn && btn.contains(e.target))) return;
  closeAddPanelMenu();
});

function loadModule(mod) {
  const frame = document.getElementById('contentFrame');
  const welcome = document.getElementById('welcomeView');
  const title = document.getElementById('headerTitle');

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

  if (!mod) {
    frame.style.display = 'none';
    frame.src = '';
    welcome.style.display = 'flex';
    title.textContent = '總覽';
    document.querySelector('[data-id="__home"]').classList.add('active');
    currentModule = null;
  } else {
    welcome.style.display = 'none';
    frame.style.display = 'block';
    frame.src = mod.src;
    title.textContent = mod.title;
    document.querySelector(`[data-id="${mod.id}"]`).classList.add('active');
    currentModule = mod;
  }

  // close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');

  const addBtn = document.getElementById('addPanelHeaderBtn');
  if (addBtn) addBtn.style.display = currentModule ? 'none' : 'inline-flex';
  if (currentModule) closeAddPanelMenu();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

// ── 主題：引擎在 pp-theme.js，storage 事件會同步到 iframe 內的模組 ──
const THEME_LABEL = { system: '⚙ 系統', light: '☀ 淺色', dark: '☾ 深色' };
function refreshThemeBtn() {
  document.getElementById('themeBtn').textContent = THEME_LABEL[PPTheme.get()];
}
function onThemeClick() {
  PPTheme.cycle();
  refreshThemeBtn();
}

// 字級（全站字體大小）— 切換後透過 pp-theme.js 同步到所有模組
const FONT_LABEL = { sm: '🔤 小', md: '🔤 標準', lg: '🔤 大', xl: '🔤 特大' };
function refreshFontBtn() {
  const b = document.getElementById('fontBtn');
  if (b) b.textContent = FONT_LABEL[PPTheme.getScale()] || FONT_LABEL.md;
}
function onFontClick() {
  PPTheme.cycleScale();
  refreshFontBtn();
}

// Data hub shortcut
function openDataHub() {
  const mod = MODULES.find(m => m.id === 'datahub');
  if (mod) loadModule(mod);
}

// Sync button hint — show last backup time from PPStore meta
function refreshSyncHint() {
  const btn = document.getElementById('syncBtn');
  if (!btn || !window.PPStore) return;
  const m = PPStore.getMeta();
  if (m.lastPushAt) {
    const d = new Date(m.lastPushAt);
    btn.title = '上次備份：' + d.toLocaleString('zh-TW', { hour12: false });
  }
}

// Init
buildNav();
renderDashboard();
refreshThemeBtn();
refreshFontBtn();
document.getElementById('addPanelHeaderBtn').style.display = currentModule ? 'none' : 'inline-flex';

// PPStore — 自動備份引擎（只在 portal shell 運作）
if (window.PPStore) {
  PPStore.startAuto();
  refreshSyncHint();
  setInterval(refreshSyncHint, 60 * 1000);
}
</script>
</body>
</html>
